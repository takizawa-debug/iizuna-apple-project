<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印刷用フォーマット</title>
    <link rel="stylesheet" href="print.css">
</head>

<body>

    <div class="print-btn-container">
        <button class="print-btn" onclick="window.print()">このページを印刷（PDFで保存）</button>
    </div>

    <div id="print-root" class="print-page">
        <!-- コンテンツがJSによって動的に生成されます -->
        <div style="text-align: center; padding: 50px;">読み込み中...</div>
    </div>

    <script type="module" src="print.js"></script>
</body>

</html>
